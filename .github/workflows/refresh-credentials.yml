name: Refresh Credentials
run-name: login-refresh-${{ inputs.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Manager login refresh job id"
        required: true
      group_count:
        description: "Number of groups in this refresh job"
        required: true
      max_parallel:
        description: "Maximum parallel GitHub runner jobs"
        required: false
        default: "12"
      browsers_per_runner:
        description: "Browser concurrency inside one runner"
        required: false
        default: "3"

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.groups.outputs.groups }}
    steps:
      - id: groups
        shell: bash
        run: |
          count="${{ inputs.group_count }}"
          if ! [[ "$count" =~ ^[0-9]+$ ]] || [ "$count" -le 0 ]; then
            echo "group_count must be a positive integer" >&2
            exit 1
          fi
          groups="$(seq 0 $((count - 1)) | jq -R . | jq -s -c .)"
          echo "groups=$groups" >> "$GITHUB_OUTPUT"

  refresh:
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix:
        group_index: ${{ fromJSON(needs.build-matrix.outputs.groups) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: go.sum

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Refresh group
        env:
          MANAGER_EXTERNAL_URL: ${{ secrets.MANAGER_EXTERNAL_URL }}
          MANAGER_EXTERNAL_TOKEN: ${{ secrets.MANAGER_EXTERNAL_TOKEN }}
          REFRESH_TARGET_CONFIG: ${{ secrets.REFRESH_TARGET_CONFIG }}
        run: |
          go run ./cmd/login-refresher \
            -manager-url "$MANAGER_EXTERNAL_URL" \
            -job-id "${{ inputs.job_id }}" \
            -group-index "${{ matrix.group_index }}" \
            -token "$MANAGER_EXTERNAL_TOKEN" \
            -headless true \
            -concurrency "${{ inputs.browsers_per_runner }}" \
            -timeout 5m
